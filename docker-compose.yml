services:

  postgres:
    image: postgres:16-alpine
    container_name: postgres_dst
    restart: always

    environment:
      POSTGRES_DB: dst_airlines
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123

    ports:
      - "5433:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/postgres:/docker-entrypoint-initdb.d

    networks:
      - dst_network

  mongo:
    image: mongo:7
    container_name: mongo_dst
    restart: always

    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}

    ports:
      - "27017:27017"

    volumes:
      - mongo_data:/data/db

    networks:
      - dst_network


  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin_dst

    restart: always

    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}

    ports:
      - "5050:80"

    depends_on:
      - postgres
    networks:
      - dst_network

  mongo-express:
    image: mongo-express:latest
    container_name: mongo_express_dst
    restart: always

    ports:
      - "8081:8081"

    depends_on:
      - mongo

    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}

      ME_CONFIG_MONGODB_SERVER: mongo

      ME_CONFIG_BASICAUTH_USERNAME: ${ME_CONFIG_BASICAUTH_USERNAME}
      ME_CONFIG_BASICAUTH_PASSWORD: ${ME_CONFIG_BASICAUTH_PASSWORD}
  
    networks:
      - dst_network

  
  python:
    build:
      context: .
      dockerfile: docker/python/Dockerfile
    container_name: dst_python
    working_dir: /app
    environment:
    - PYTHONPATH=/app
    env_file: 
      - .env
    volumes:
      - .:/app
    command: tail -f /dev/null
    networks:
      - dst_network


  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka_dst
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:29093'
      KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,PLAINTEXT_HOST://0.0.0.0:9092'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_LOG_DIRS: '/tmp/kraft-combined-logs'
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
    networks:
      - dst_network
      
volumes:

  postgres_data:

  mongo_data:

networks:
  dst_network:
    driver: bridge